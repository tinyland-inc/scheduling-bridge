name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@v2.5.0
    with:
      runner_mode: shared
      shared_runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      workspace_mode: isolated
      publish_mode: same_runner
      npm_publish_mode: disabled
      node_versions: '["22","24"]'
      publish_node_version: "24"
      pnpm_version: "9.15.9"
      metadata_check_command: pnpm check:release-metadata
      typecheck_command: pnpm typecheck
      unit_test_command: pnpm test
      build_command: node scripts/check-artifact-authority.mjs
      package_check_command: pnpm check:package
      bazel_targets: "//:typecheck //:pkg //:test"
      # Cache-first shared-cache-backed Bazel validation (TIN-2110 bridge canary).
      # Routes the Bazel validation through the fail-closed cache-attachment
      # contract + --config=ci-cached --remote_cache=$BAZEL_REMOTE_CACHE
      # (read-only, no executor). Endpoint is injected at runtime by the
      # in-cluster nix-setup; nothing is baked. Cache-first only.
      # runner_mode stays shared: that is the variable under test for the canary.
      cache_backed: true
      package_dir: ./bazel-bin/pkg
      npm_access: public
      npm_publish_provenance: true
      github_package_name: "@jesssullivan/scheduling-bridge"
      dry_run: true
