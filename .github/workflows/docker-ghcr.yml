name: docker-ghcr

on:
  push:
    branches: [main]
    tags: ['v*', 'phase-*']
  pull_request:
    # Build-only (no push) on PRs touching the Dockerfile or this workflow
    # so we catch build breakage before merge.
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-ghcr.yml'
      - '.dockerignore'
      - 'BUILD.bazel'
      - 'MODULE.bazel'
      - '.bazelversion'
      - '.npmrc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/**'
      - 'src/**'
  workflow_dispatch:

concurrency:
  group: docker-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize Bazel-derived Docker package
        run: pnpm build

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Login only on push events; PR builds are validation-only (push=false below).
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/acuity-middleware
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          # Push on branch/tag events; build-only on PRs (validation).
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
