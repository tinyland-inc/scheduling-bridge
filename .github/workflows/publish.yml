name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@462272a83640c0fddbe2925a87064a7d2575c03a
    with:
      runner_mode: shared
      shared_runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      workspace_mode: isolated
      publish_mode: same_runner
      node_versions: '["24"]'
      publish_node_version: "24"
      pnpm_version: "9.15.9"
      metadata_check_command: pnpm check:release-metadata
      typecheck_command: pnpm typecheck
      unit_test_command: pnpm test
      build_command: node scripts/check-artifact-authority.mjs
      package_check_command: pnpm check:package
      bazel_targets: "//:pkg"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      npm_publish_provenance: true
      github_package_name: "@jesssullivan/scheduling-bridge"
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
