site_name: scheduling-bridge
site_description: Remote Acuity scheduling bridge and package authority docs
repo_url: https://github.com/Jesssullivan/scheduling-bridge
theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Runtime Contract: runtime-contract.md
  - Build And Release: build-and-release.md
  - Consumers: consumers.md
  - Design:
      - Flow DAG Formalization (TIN-1993): design/flow-dag-formalization.md
      - Trace-Conformance Parity Evidence (TIN-2072): design/parity-evidence.md
  - Generated Facts: generated/repo-facts.md
